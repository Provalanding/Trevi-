<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Ex Home</title>

<style>

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  overflow-x: hidden;
  font-family: Arial, sans-serif;
}

/* SFONDO */
body {
  background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
  url("Fontana-di-Trevi-Anita-Ekberg.jpg") center/cover fixed;
  color: white;
}

/* HEADER */
header {
  position: absolute;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  z-index: 999;
}

header img {
  height: 55px;
}

/* CONTATTACI */
.contact-btn {
  background: white;
  color: black;
  padding: 10px 14px;
  border-radius: 20px;
  text-decoration: none;
  font-weight: bold;
}

/* HERO */
.hero {
  height: 85vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 12px;
}

/* SEZIONI */
.section {
  max-width: 1000px;
  margin: 40px auto;
  background: rgba(255,255,255,0.95);
  color: black;
  padding: 40px;
  border-radius: 16px;
}

/* GALLERY */
.gallery {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.gallery img {
  width: 100%;
  max-width: 250px;
  border-radius: 10px;
}

/* FORM */
form {
  display: flex;
  flex-direction: column;
  max-width: 400px;
  margin: auto;
}

input, button {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

/* BUTTON */
button {
  background: #e60023;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #b8001a;
}

/* WHATSAPP FLOAT */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
}

.whatsapp img {
  width: 55px;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
}

.popup-content {
  background: white;
  color: black;
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  animation: pop 0.25s ease;
}

@keyframes pop {
  from { transform: scale(0.8); }
  to { transform: scale(1); }
}

.popup h2 {
  color: #e60023;
}

</style>
</head>

<body>

<header>
  <img src="Logo Double Ex Home.png">
  <a class="contact-btn" href="#form">Contattaci</a>
</header>

<div class="hero">
  <h1>Double Ex Home - Fontana di Trevi</h1>
</div>

<div class="section">
  <h2>La struttura</h2>
  <div class="gallery">
    <img src="Salone_4.jpg">
    <img src="Stanza_A_3.jpg">
    <img src="Stanza_B_3.jpg">
    <img src="Terrazzo_1.jpg">
  </div>
</div>

<div class="section" id="form">
  <h2>Richiedi disponibilità</h2>

  <form id="formEl">
    <input type="text" id="nome" placeholder="Nome e Cognome" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="text" id="telefono" placeholder="Numero telefono cliente" required>
    <input type="date" id="checkin" required>
    <input type="date" id="checkout" required>

    <button type="submit" id="btn">Invia richiesta</button>
  </form>
</div>

<footer style="text-align:center;padding:30px;">
  info@doubleexhome - +393891282883
</footer>

<!-- WHATSAPP FLOAT (APRE CHAT CON TE) -->
<a class="whatsapp"
   href="https://wa.me/393891282883"
   target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <h2>Richiesta inviata!</h2>
    <p>Ti contatteremo al più presto.</p>
  </div>
</div>

<script>

let sending = false;

document.getElementById("formEl").addEventListener("submit", function(e){
  e.preventDefault();

  if(sending) return;
  sending = true;

  document.getElementById("btn").disabled = true;

  let nome = document.getElementById("nome").value;
  let email = document.getElementById("email").value;
  let telefono = document.getElementById("telefono").value;
  let checkin = document.getElementById("checkin").value;
  let checkout = document.getElementById("checkout").value;

  let messaggio =
`🏠 RICHIESTA DISPONIBILITÀ

Nome: ${nome}
Email: ${email}
Telefono cliente: ${telefono}

Check-in: ${checkin}
Check-out: ${checkout}

Double Ex Home`;

  // APRE CHAT CON TE (GESTORE)
  let url = `https://wa.me/393891282883?text=${encodeURIComponent(messaggio)}`;

  window.open(url, "_blank");

  document.getElementById("popup").style.display = "flex";

  setTimeout(() => {
    sending = false;
    document.getElementById("btn").disabled = false;
  }, 5000);
});

</script>

</body>
</html>
