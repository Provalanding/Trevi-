<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Vacanze Trevi</title>

<style>

/* 🌄 SFONDO GENERALE */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
              url('Fontana-di-Trevi-Anita-Ekberg.jpg') center/cover fixed;
  color: white;
}

/* 🧭 HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: rgba(255,255,255,0.9);
}

header img {
  height: 50px;
}

.btn {
  background: #ff385c;
  color: white;
  padding: 10px 18px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

/* 📞 CHIAMA ORA */
.call-btn {
  background: #111;
  color: white;
  padding: 10px 16px;
  border-radius: 20px;
  text-decoration: none;
  font-weight: bold;
  margin-left: 10px;
}

.call-btn:hover {
  background: #333;
}

/* 🏡 HERO */
.hero {
  height: 80vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.hero h1 {
  font-size: 36px;
  background: rgba(0,0,0,0.5);
  padding: 15px;
  border-radius: 10px;
}

/* 🏠 SEZIONI STYLE AIRBNB */
.section {
  padding: 50px 20px;
  text-align: center;
  background: rgba(255,255,255,0.95);
  color: #111;
  margin: 20px auto;
  border-radius: 16px;
  max-width: 1000px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* 📸 GALLERY */
.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

.gallery img {
  width: 300px;
  height: 200px;
  object-fit: cover;
  border-radius: 12px;
}

/* 📩 FORM */
form {
  max-width: 400px;
  margin: auto;
  display: flex;
  flex-direction: column;
}

input, button {
  margin: 10px 0;
  padding: 12px;
  border-radius: 6px;
  border: none;
}

/* 💬 WHATSAPP FLOAT */
.whatsapp-clean {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: transparent; /* ❌ niente cerchio verde */
  border: none;
  box-shadow: none;
  cursor: pointer;
}

.whatsapp-clean img {
  width: 55px;
  height: 55px;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
  transition: transform 0.2s ease;
}

.whatsapp-clean img:hover {
  transform: scale(1.1);
}

.whatsapp img {
  width: 35px;
  height: 35px;
}

/* 🦶 FOOTER */
footer {
  background: #111;
  color: white;
  padding: 20px;
  text-align: center;
}

</style>
</head>

<body>

<!-- 🧭 HEADER -->
<header>
  <img src="Logo Double Ex Home.png">

  <div>
    <button class="btn" onclick="scrollToForm()">Prenota</button>
    <a class="call-btn" href="tel:+393891282883">📞 Chiama ora</a>
  </div>
</header>

<!-- 🏡 HERO -->
<section class="hero">
  <h1>Casa Vacanze a Fontana di Trevi</h1>
  <p>Richiesta disponibilità diretta</p>
</section>

<!-- 📸 STRUTTURA -->
<section class="section">
  <h2>La struttura</h2>

  <div class="gallery">
    <img src="Salone_4.jpg">
    <img src="Stanza_A_3.jpg">
    <img src="Terrazzo_1.jpg">
    <img src="Stanza_B_3.jpg">
  </div>
</section>

<!-- 📩 RICHIESTA DISPONIBILITÀ -->
<section class="section" id="form">
  <h2>Richiedi disponibilità</h2>

  <form onsubmit="sendWhatsApp(event)">
    <input type="text" id="nome" placeholder="Nome" required>
    <input type="email" id="emailInput" placeholder="Email" required>
    <input type="date" id="checkin" required>
    <input type="date" id="checkout" required>

    <button class="btn">Invia richiesta</button>
  </form>

  <p>Ti risponderemo al più presto</p>
</section>

<!-- 🦶 FOOTER -->
<footer>
  <p id="footerText"></p>
</footer>

<!-- 💬 WHATSAPP -->
<a class="whatsapp-clean" href="#" onclick="sendWhatsApp(event)">
  <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<script>

/* 🔧 CONFIGURAZIONE */
const telefono = "393891282883";
const emailHost = "info@doubleexhome.com";
const nomeBrand = "Doubleexhome";

document.getElementById("footerText").innerText = "© 2026 " + nomeBrand;

/* 📍 SCROLL */
function scrollToForm() {
  document.getElementById("form").scrollIntoView({behavior:"smooth"});
}

/* 💬 RICHIESTA DISPONIBILITÀ */
function sendWhatsApp(e) {
  e.preventDefault();

  let nome = document.getElementById("nome").value;
  let email = document.getElementById("emailInput").value;
  let checkin = document.getElementById("checkin").value;
  let checkout = document.getElementById("checkout").value;

  let messaggio = 
`📩 RICHIESTA DISPONIBILITÀ

🏠 Casa Vacanze Trevi

Nome: ${nome}
Email: ${email}
Check-in: ${checkin}
Check-out: ${checkout}

---
Richiesta inviata dal sito web`;

  // 📲 WhatsApp
  window.open(
    `https://wa.me/${telefono}?text=${encodeURIComponent(messaggio)}`,
    "_blank"
  );

  // 📧 EMAIL SOLO A TE
  window.location.href =
`mailto:${emailHost}
?subject=Richiesta disponibilità - ${nome}
&body=${encodeURIComponent(messaggio)}`;
}

</script>

</body>
</html>
