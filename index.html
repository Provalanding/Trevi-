<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Vacanze Trevi</title>

<style>

/* 🔥 RESET ANTI SCROLL ORIZZONTALE */
* * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  overflow-x: hidden; /* Blocco dello scroll laterale */
  width: 100%; /* Impedisce che la larghezza vada oltre il 100% */
}

body {
  background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
              url('sfondo.jpg') center/cover fixed;
  color: white;
}
/* 🌄 SFONDO */
body {
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
              url('Fontana-di-Trevi-Anita-Ekberg.jpg') center/cover fixed;
  color: white;
}

/* 🧭 HEADER TRASPARENTE */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: transparent;
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 999;
}

header img {
  height: 50px;
  max-width: 100%;
}

/* 📞 BUTTON */
.call-btn {
  background: #111;
  color: white;
  padding: 10px 16px;
  border-radius: 20px;
  text-decoration: none;
  white-space: nowrap;
}

/* 🏡 HERO */
.hero {
  height: 80vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 0 20px;
}

.hero h1 {
  font-size: 32px;
  background: rgba(0,0,0,0.5);
  padding: 15px;
  border-radius: 10px;
  max-width: 100%;
}

/* 🏠 SEZIONI */
.section {
  padding: 50px 20px;
  text-align: center;
  background: rgba(255,255,255,0.95);
  color: #111;
  margin: 20px auto;
  border-radius: 16px;
  max-width: 1000px;
  width: 100%;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* 📸 GALLERY RESPONSIVE */
.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  max-width: 100%;
}

.gallery img {
  width: 100%;
  max-width: 300px;
  height: 200px;
  object-fit: cover;
  border-radius: 12px;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.03);
}

/* 📩 FORM */
form {
  max-width: 400px;
  margin: auto;
  display: flex;
  flex-direction: column;
}

input, button {
  margin: 10px 0;
  padding: 12px;
  border-radius: 6px;
  border: none;
  width: 100%;
  box-sizing: border-box;
}

/* 🔴 BUTTON ROSSO */
button {
  background: #e60023; /* Colore rosso brillante */
  color: white;
  font-weight: bold;
  padding: 12px 20px;
  border-radius: 12px; /* Bordo più morbido */
  border: none;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 6px 18px rgba(230, 0, 35, 0.3); /* Ombra leggera */
}

button:hover {
  background: #b8001a; /* Rosso più scuro quando hover */
  transform: translateY(-2px); /* Effetto di sollevamento */
}

button:active {
  transform: scale(0.98); /* Effetto compressione quando clicchi */
}

/* 💬 WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: transparent;
  cursor: pointer;
  z-index: 999;
}

.whatsapp img {
  width: 55px;
  height: 55px;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
}

/* 🦶 FOOTER */
footer {
  background: transparent;
  color: white;
  padding: 40px 20px;
  text-align: center;
}

.footer-content {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 40px;
  max-width: 100%;
}

.footer-box {
  width: 300px;
  max-width: 100%;
  text-align: left;
}

iframe {
  width: 100%;
  border-radius: 10px;
}

/* ✨ ANIMAZIONI AIRBNB STYLE */
.section {
  opacity: 0;
  transform: translateY(25px);
  animation: fadeUp 0.7s ease forwards;
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>

<body>

<!-- 🧭 HEADER -->
<header>
  <img src="Logo Double Ex Home.png">

  <a class="call-btn" href="tel:+393891282883">📞 Chiama ora</a>
</header>

<!-- 🏡 HERO -->
<section class="hero">
  <h1>Casa Vacanze a Fontana di Trevi</h1>
  <p>Richiesta disponibilità diretta</p>
</section>

<!-- 📸 GALLERY -->
<section class="section">
  <h2>La struttura</h2>

  <div class="gallery">
    <img src="Salone_4.jpg">
    <img src="Stanza_A_3.jpg">
    <img src="Terrazzo_1.jpg">
    <img src="Stanza_B_3.jpg">
  </div>
</section>

<!-- 📩 FORM -->
<section class="section" id="form">
  <h2>Richiedi disponibilità</h2>

  <form onsubmit="sendWhatsApp(event)">
    <input type="text" id="nome" placeholder="Nome e cognome" required>
    <input type="email" id="emailInput" placeholder="Email" required>
    <input type="date" id="checkin" required>
    <input type="date" id="checkout" required>

    <button type="submit">Invia richiesta</button>
  </form>
</section>

<!-- 🦶 FOOTER -->
<footer>
  <div class="footer-content">

    <div class="footer-box">
      <h3>Casa Vacanze Trevi</h3>
      <p>Roma centro storico</p>
      <p>Email: info@doubleexhome.com</p>
      <p>Tel: +39 3891282883</p>
    </div>

    <div class="footer-box">
      <h3>Dove siamo</h3>
      <p>Piazza dei Crociferi, 3 - Roma</p>

      <iframe
        src="https://www.google.com/maps?q=Piazza%20dei%20Crociferi%203%20Roma&output=embed">
      </iframe>
    </div>

  </div>
</footer>

<!-- 💬 WHATSAPP -->
<a class="whatsapp" href="#" onclick="sendWhatsApp(event)">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/960px-WhatsApp.svg.png">
</a>

<script>

const telefono = "393891282883";
const emailHost = " info@doubleexhome.com";

function formatDateITA(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString("it-IT");
}

function sendWhatsApp(e) {
  e.preventDefault();

  let nome = document.getElementById("nome").value;
  let email = document.getElementById("emailInput").value;
  let checkin = formatDateITA(document.getElementById("checkin").value);
  let checkout = formatDateITA(document.getElementById("checkout").value);

  let messaggio =
`RICHIESTA DISPONIBILITÀ

Casa Vacanze Trevi

Nome: ${nome}
Email: ${email}
Check-in: ${checkin}
Check-out: ${checkout}`;

  window.open(
    `https://wa.me/${telefono}?text=${encodeURIComponent(messaggio)}`,
    "_blank"
  );

  let oggetto = `Richiesta disponibilità Trevi - ${nome} - ${checkin} / ${checkout}`;

  window.location.href =
`mailto:${emailHost}?subject=${encodeURIComponent(oggetto)}&body=${encodeURIComponent(messaggio)}`;
}

</script>

</body>
</html>
