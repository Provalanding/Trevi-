<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Vacanze</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
              url('Fontana-di-Trevi-Anita-Ekberg.jpg') center/cover fixed;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: rgba(255,255,255,0.9);
}

header img {
  height: 50px;
}

.btn {
  background: #ff385c;
  color: white;
  padding: 10px 18px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

/* HERO */
.hero {
  height: 80vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.hero h1 {
  font-size: 36px;
  background: rgba(0,0,0,0.5);
  padding: 15px;
  border-radius: 10px;
}

/* SEZIONI */
.section {
  padding: 50px 20px;
  text-align: center;
  background: rgba(255, 255, 255, 0.05); /* quasi trasparente */
  color: white;
  margin: 20px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.3);
  backdrop-filter: blur(8px); /* effetto vetro */
}

/* GALLERY */
.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

.gallery img {
  width: 300px;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}

/* FORM */
form {
  max-width: 400px;
  margin: auto;
  display: flex;
  flex-direction: column;
}

input {
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.3);
}

input::placeholder {
  color: rgba(255,255,255,0.7);
}

button {
  background: #ff385c;
  color: white;
  border: none;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 28px;
  color: white;
  text-decoration: none;
}

/* FOOTER */
footer {
  background: #111;
  color: white;
  padding: 20px;
  text-align: center;
}
</style>
</head>

<body>

<header>
  <!-- 🔹 LOGO -->
  <img src="Logo Double Ex Home.png">
  <button class="btn" onclick="scrollToForm()">Prenota</button>
</header>

<section class="hero">
  <h1>Casa Vacanze</h1>
  <p>Fontana di Trevi - Roma</p>
</section>

<!-- 📸 GALLERY (SOLO FOTO) -->
<section class="section">
  <h2>La struttura</h2>

  <div class="gallery">
    <img src="Salone_4.jpg">
    <img src="Stanza_A_3.jpg">
    <img src="Terrazzo_1.jpg">
    <img src="Stanza_B_3.jpg">
  </div>
</section>

<!-- 📩 CONTATTO -->
<section class="section" id="form">
  <h2>Richiedi disponibilità</h2>

  <form onsubmit="sendWhatsApp(event)">
    <input type="text" id="nome" placeholder="Nome" required>
    <input type="email" id="emailInput" placeholder="Email" required>
    <input type="date" id="checkin" required>
    <input type="date" id="checkout" required>

    <button class="btn">Invia richiesta</button>
  </form>

  <p>Oppure scrivici a: <b id="emailText"></b></p>
</section>

<footer>
  <p id="footerText"></p>
</footer>

<a class="whatsapp" href="#" onclick="sendWhatsApp(event)">💬</a>

<script>
/* 🔧 PERSONALIZZA QUI */

const telefono = "393891282883";
const email = "info@doubleexhome.com";
const nomeBrand = "Doubleexhome";

/* AUTO */

document.getElementById("emailText").innerText = email;
document.getElementById("footerText").innerText = "© 2026 " + nomeBrand;

/* FUNZIONI */

function scrollToForm() {
  document.getElementById("form").scrollIntoView({behavior:"smooth"});
}

function sendWhatsApp(e) {
  e.preventDefault();

  let nome = document.getElementById("nome").value;
  let checkin = document.getElementById("checkin").value;
  let checkout = document.getElementById("checkout").value;

  let msg = `Ciao, sono ${nome}. Vorrei informazioni dal ${checkin} al ${checkout}`;

  window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(msg)}`, "_blank");
}
</script>

</body>
</html>
