<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Ex Home - Fontana di Trevi</title>

<style>

/* RESET */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  overflow-x: hidden;
  font-family: Arial, sans-serif;
}

/* SFONDO */
body {
  background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
  url("Fontana-di-Trevi-Anita-Ekberg.jpg") center/cover fixed;
  color: white;
}

/* HEADER */
header {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: transparent;
  z-index: 999;
}

header img {
  height: 55px;
}

/* HERO */
.hero {
  height: 85vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

.hero h1 {
  font-size: 34px;
  background: rgba(0,0,0,0.4);
  padding: 15px 20px;
  border-radius: 12px;
}

/* SEZIONI */
.section {
  max-width: 1000px;
  margin: 40px auto;
  background: rgba(255,255,255,0.95);
  color: #111;
  padding: 40px 20px;
  border-radius: 16px;
}

/* GALLERY */
.gallery {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
}

.gallery img {
  width: 100%;
  max-width: 300px;
  height: 200px;
  object-fit: cover;
  border-radius: 12px;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* FORM */
form {
  display: flex;
  flex-direction: column;
  max-width: 400px;
  margin: auto;
}

input, button {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  width: 100%;
}

/* BUTTON ROSSO */
button {
  background: #e60023;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #b8001a;
}

/* WHATSAPP FLOAT */
.whatsapp-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 999;
}

.whatsapp-float img {
  width: 55px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 40px 20px;
  background: transparent;
}

/* POPUP AIRBNB STYLE */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
  z-index: 9999;
  animation: fadeIn 0.3s ease;
}

.popup-content {
  background: white;
  color: #111;
  padding: 30px;
  border-radius: 14px;
  text-align: center;
  width: 300px;
  animation: popIn 0.3s ease;
}

.popup h2 {
  color: #e60023;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes popIn {
  from {transform: scale(0.8);}
  to {transform: scale(1);}
}

.popup-close {
  position: absolute;
  margin-left: 120px;
  cursor: pointer;
  font-size: 22px;
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
  <img src="Logo Double Ex Home.png">
</header>

<!-- HERO -->
<div class="hero">
  <h1>Double Ex Home - Fontana di Trevi</h1>
</div>

<!-- GALLERY -->
<div class="section">
  <h2>La Struttura</h2>
  <div class="gallery">
    <img src="Salone_4.jpg">
    <img src="Stanza_A_3.jpg">
    <img src="Stanza_B_3.jpg">
    <img src="Terrazzo_1.jpg">
  </div>
</div>

<!-- FORM -->
<div class="section">
  <h2>Richiedi disponibilità</h2>

  <form id="form">
    <input type="text" id="nome" placeholder="Nome e Cognome" required>
    <input type="email" placeholder="Email (info@doubleexhome)">
    <input type="date" id="checkin" required>
    <input type="date" id="checkout" required>

    <button id="btnInvia" type="submit">Invia richiesta</button>
  </form>
</div>

<!-- FOOTER -->
<footer>
  <p>Email: info@doubleexhome</p>
  <p>Roma - Fontana di Trevi</p>
</footer>

<!-- WHATSAPP FLOAT -->
<a class="whatsapp-float"
   href="https://wa.me/393891282883"
   target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <span class="popup-close" onclick="closePopup()">×</span>
    <h2>Richiesta inviata!</h2>
    <p>Ti risponderemo al più presto.</p>
  </div>
</div>

<script>

let sending = false;

function formatDate(date) {
  return new Date(date).toLocaleDateString("it-IT");
}

document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();

  if (sending) return; // 🔴 BLOCCO DOPPIO INVIO
  sending = true;

  document.getElementById("btnInvia").disabled = true;

  let nome = document.getElementById("nome").value;
  let checkin = formatDate(document.getElementById("checkin").value);
  let checkout = formatDate(document.getElementById("checkout").value);

  let messaggio =
`RICHIESTA DISPONIBILITÀ

Nome: ${nome}
Check-in: ${checkin}
Check-out: ${checkout}

Double Ex Home`;

  let url = `https://wa.me/393891282883?text=${encodeURIComponent(messaggio)}`;

  window.open(url, "_blank");

  showPopup();

  setTimeout(() => {
    sending = false;
    document.getElementById("btnInvia").disabled = false;
  }, 5000);
});

function showPopup() {
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
