<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Vacanze</title>

<style>
body { margin:0; font-family:Arial; background:#f7f7f7; }

/* HEADER */
header {
  display:flex; justify-content:space-between;
  align-items:center; padding:15px 25px;
  background:white; position:sticky; top:0;
}

header img { height:50px; }

.btn {
  background:#ff385c; color:white;
  padding:10px 18px; border-radius:20px;
  border:none; cursor:pointer;
}

/* HERO */
.hero {
  height:80vh;
  background:url('https://images.unsplash.com/photo-1528909514045-2fa4ac7a08ba') center/cover;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  color:white; text-align:center;
}

.hero h1 {
  background:rgba(0,0,0,0.4);
  padding:15px; border-radius:10px;
}

/* SEZIONI */
.section { padding:50px 20px; text-align:center; }

.cards {
  display:flex; flex-wrap:wrap;
  justify-content:center; gap:20px;
}

.card {
  width:300px; background:white;
  border-radius:10px; overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img {
  width:100%; height:200px; object-fit:cover;
}

.card p { padding:10px; }

/* FORM */
form {
  max-width:400px; margin:auto;
  display:flex; flex-direction:column;
}

input, button {
  margin:10px 0; padding:12px;
  border-radius:6px; border:none;
}

/* WHATSAPP */
.whatsapp {
  position:fixed; bottom:20px; right:20px;
  background:#25D366; width:60px; height:60px;
  border-radius:50%; display:flex;
  justify-content:center; align-items:center;
  font-size:28px; color:white;
  text-decoration:none;
}

/* FOOTER */
footer {
  background:#111; color:white;
  padding:20px; text-align:center;
}
</style>
</head>

<body>

<header>
  <!-- 🔹 CAMBIA LOGO QUI -->
  <img src="https://via.placeholder.com/150x50?text=LOGO">

  <button class="btn" onclick="scrollToForm()">Prenota</button>
</header>

<section class="hero">
  <h1>Casa Vacanze vicino Fontana di Trevi</h1>
  <p>Posizione esclusiva nel cuore di Roma</p>
</section>

<section class="section">
  <h2>I nostri servizi</h2>

  <div class="cards">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
      <p>Posizione centrale</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1505691723518-36a5ac3b2f1d">
      <p>Comfort e design moderno</p>
    </div>
  </div>
</section>

<section class="section" id="form">
  <h2>Richiedi disponibilità</h2>

  <form onsubmit="sendWhatsApp(event)">
    <input type="text" id="nome" placeholder="Nome" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="date" id="checkin" required>
    <input type="date" id="checkout" required>

    <button class="btn">Invia richiesta</button>
  </form>

  <p>Oppure scrivici a: <b id="emailText"></b></p>
</section>

<footer>
  <p id="footerText"></p>
</footer>

<a class="whatsapp" href="#" onclick="sendWhatsApp(event)">💬</a>

<script>
/* ================================
   🔧 PERSONALIZZAZIONE (MODIFICA QUI)
================================ */

const telefono = "393XXXXXXXXX"; // 📱 tuo numero
const email = "tuamail@email.com"; // 📧 tua email
const nomeBrand = "Trevi Luxury Stay"; // 🏷️ nome attività

/* ================================
   FUNZIONI
================================ */

document.getElementById("emailText").innerText = email;
document.getElementById("footerText").innerText = "© 2026 " + nomeBrand;

function scrollToForm() {
  document.getElementById("form").scrollIntoView({behavior:"smooth"});
}

function sendWhatsApp(e) {
  e.preventDefault();

  let nome = document.getElementById("nome").value;
  let checkin = document.getElementById("checkin").value;
  let checkout = document.getElementById("checkout").value;

  let msg = `Ciao, sono ${nome}. Vorrei info dal ${checkin} al ${checkout}`;

  window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(msg)}`, "_blank");
}
</script>

</body>
</html>
